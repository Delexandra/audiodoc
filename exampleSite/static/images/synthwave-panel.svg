<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <rect width="800" height="420" fill="#1d1921"/>
  <rect x="20" y="20" width="760" height="380" rx="8" fill="#252030" stroke="#554265" stroke-width="1"/>

  <!-- title -->
  <text x="400" y="55" text-anchor="middle" fill="#e8e0e8" font-family="monospace" font-size="18" font-weight="600">synthwave — polyphonic wavetable synthesizer</text>

  <!-- osc section -->
  <rect x="40" y="75" width="230" height="160" rx="6" fill="#1d1921" stroke="#554265"/>
  <text x="155" y="100" text-anchor="middle" fill="#8b70a2" font-family="monospace" font-size="12">oscillator 1</text>
  <circle cx="80" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="80" cy="140" r="3" fill="#ffd714"/>
  <text x="80" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">waveform</text>
  <circle cx="155" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="155" cy="140" r="3" fill="#ffd714"/>
  <text x="155" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">fine</text>
  <circle cx="230" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="230" cy="140" r="3" fill="#ffd714"/>
  <text x="230" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">level</text>
  <rect x="55" y="195" width="180" height="25" rx="4" fill="#1a1520" stroke="#554265"/>
  <text x="145" y="212" text-anchor="middle" fill="#d1b8d1" font-family="monospace" font-size="11">saw — classic</text>

  <!-- filter section -->
  <rect x="285" y="75" width="230" height="160" rx="6" fill="#1d1921" stroke="#554265"/>
  <text x="400" y="100" text-anchor="middle" fill="#8b70a2" font-family="monospace" font-size="12">filter</text>
  <circle cx="325" cy="140" r="22" fill="none" stroke="#ffd714" stroke-width="2"/>
  <circle cx="325" cy="140" r="3" fill="#ffd714"/>
  <text x="325" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">cutoff</text>
  <circle cx="400" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="400" cy="140" r="3" fill="#ffd714"/>
  <text x="400" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">reso</text>
  <circle cx="475" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="475" cy="140" r="3" fill="#ffd714"/>
  <text x="475" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">drive</text>
  <rect x="300" y="195" width="200" height="25" rx="4" fill="#1a1520" stroke="#554265"/>
  <text x="400" y="212" text-anchor="middle" fill="#d1b8d1" font-family="monospace" font-size="11">LP24 — 24dB/oct</text>

  <!-- effects section -->
  <rect x="530" y="75" width="230" height="160" rx="6" fill="#1d1921" stroke="#554265"/>
  <text x="645" y="100" text-anchor="middle" fill="#8b70a2" font-family="monospace" font-size="12">effects</text>
  <circle cx="570" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="570" cy="140" r="3" fill="#ffd714"/>
  <text x="570" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">reverb</text>
  <circle cx="645" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="645" cy="140" r="3" fill="#ffd714"/>
  <text x="645" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">delay</text>
  <circle cx="720" cy="140" r="22" fill="none" stroke="#554265" stroke-width="2"/>
  <circle cx="720" cy="140" r="3" fill="#ffd714"/>
  <text x="720" y="175" text-anchor="middle" fill="#817f82" font-family="monospace" font-size="10">chorus</text>

  <!-- bottom bar — modulation matrix -->
  <rect x="40" y="255" width="720" height="120" rx="6" fill="#1d1921" stroke="#554265"/>
  <text x="400" y="282" text-anchor="middle" fill="#8b70a2" font-family="monospace" font-size="14" font-weight="600">modulation matrix</text>

  <!-- slot 1: visual bar -->
  <text x="70" y="315" fill="#d1b8d1" font-family="monospace" font-size="12">LFO 1</text>
  <line x1="150" y1="311" x2="170" y2="311" stroke="#554265" stroke-width="1"/>
  <text x="180" y="315" fill="#817f82" font-family="monospace" font-size="12">cutoff</text>
  <rect x="280" y="305" width="250" height="12" rx="6" fill="#252030"/>
  <rect x="280" y="305" width="162" height="12" rx="6" fill="#ffd714"/>

  <!-- slot 2: visual bar -->
  <text x="70" y="345" fill="#d1b8d1" font-family="monospace" font-size="12">env 2</text>
  <line x1="150" y1="341" x2="170" y2="341" stroke="#554265" stroke-width="1"/>
  <text x="180" y="345" fill="#817f82" font-family="monospace" font-size="12">pitch</text>
  <rect x="280" y="335" width="250" height="12" rx="6" fill="#252030"/>
  <rect x="280" y="335" width="75" height="12" rx="6" fill="#8b70a2"/>

  <!-- empty slots -->
  <rect x="280" y="358" width="250" height="6" rx="3" fill="#252030" opacity="0.4"/>
  <rect x="280" y="368" width="250" height="6" rx="3" fill="#252030" opacity="0.2"/>
</svg>
